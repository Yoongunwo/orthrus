---
# ConfigMap: init script to create databases and tables on first boot
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
data:
  init-create-databases.sh: |
    #!/bin/bash
    set -e

    echo "Starting database and table creation..."

    for dataset in clearscope_e3 cadets_e3 theia_e3 clearscope_e5 cadets_e5 theia_e5
    do
        DATASET_NAME=$(echo "$dataset" | tr '[:upper:]' '[:lower:]')
        echo "Creating database and tables for: $DATASET_NAME"

        psql -U postgres <<EOF
    CREATE DATABASE $DATASET_NAME;
    \c $DATASET_NAME;

    CREATE TABLE event_table (
        src_node VARCHAR,
        src_index_id VARCHAR,
        operation VARCHAR,
        dst_node VARCHAR,
        dst_index_id VARCHAR,
        event_uuid VARCHAR NOT NULL,
        timestamp_rec BIGINT,
        _id SERIAL PRIMARY KEY
    );
    ALTER TABLE event_table OWNER TO postgres;
    CREATE UNIQUE INDEX event_table__id_uindex ON event_table (_id);
    GRANT DELETE, INSERT, REFERENCES, SELECT, TRIGGER, TRUNCATE, UPDATE ON event_table TO postgres;

    CREATE TABLE file_node_table (
        node_uuid VARCHAR NOT NULL,
        hash_id VARCHAR NOT NULL,
        path VARCHAR,
        index_id BIGINT,
        PRIMARY KEY (node_uuid, hash_id)
    );
    ALTER TABLE file_node_table OWNER TO postgres;

    CREATE TABLE netflow_node_table (
        node_uuid VARCHAR NOT NULL,
        hash_id VARCHAR NOT NULL,
        src_addr VARCHAR,
        src_port VARCHAR,
        dst_addr VARCHAR,
        dst_port VARCHAR,
        index_id BIGINT,
        PRIMARY KEY (node_uuid, hash_id)
    );
    ALTER TABLE netflow_node_table OWNER TO postgres;

    CREATE TABLE subject_node_table (
        node_uuid VARCHAR,
        hash_id VARCHAR,
        path VARCHAR,
        cmd VARCHAR,
        index_id BIGINT,
        PRIMARY KEY (node_uuid, hash_id)
    );
    ALTER TABLE subject_node_table OWNER TO postgres;
    EOF

        echo "Database '$DATASET_NAME' and tables created successfully!"
    done

    echo "All databases and tables created successfully!"

---
# PersistentVolumeClaim: postgres data storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
# Deployment: postgres
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            # NOTE: /data 는 실제 DARPA 데이터가 있는 호스트 경로로 변경하세요.
            # hostPath를 사용하거나 별도 PVC를 마운트하세요.
            # - name: input-data
            #   mountPath: /data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
            defaultMode: 0755
        # - name: input-data
        #   hostPath:
        #     path: /data   # 실제 데이터 경로로 변경

---
# Service: ClusterIP — 같은 클러스터 내 Pod에서 "postgres" 호스트명으로 접근 가능
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
