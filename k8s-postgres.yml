---
# ConfigMap: init script to create databases and tables on first boot
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
data:
  # 01: 먼저 빈 데이터베이스 생성
  01-create-databases.sh: |
    #!/bin/bash
    set -e

    echo "Creating empty databases..."

    for dataset in clearscope_e3 cadets_e3 theia_e3 clearscope_e5 cadets_e5 theia_e5
    do
        DATASET_NAME=$(echo "$dataset" | tr '[:upper:]' '[:lower:]')
        echo "Creating database: $DATASET_NAME"
        psql -U postgres -c "CREATE DATABASE $DATASET_NAME;"
        echo "Database '$DATASET_NAME' created."
    done

    echo "All databases created."

  # 02: /data/*.dump 파일을 각 데이터베이스에 restore
  02-restore-dumps.sh: |
    #!/bin/bash
    set -e

    echo "Starting dump restore from /data/..."

    for dump_file in /data/*.dump; do
        [ -e "$dump_file" ] || { echo "No dump files found in /data/. Skipping restore."; exit 0; }
        db_name=$(basename "$dump_file" .dump)
        echo "Restoring $dump_file into database '$db_name'..."
        pg_restore -U postgres -d "$db_name" "$dump_file" || echo "Warning: restore of $db_name had errors (may be partial)"
        echo "Restored '$db_name' successfully."
    done

    echo "All dumps restored."

---
# PersistentVolume: hostPath 기반 (노드 로컬 디스크)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-data-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ''
  hostPath:
    path: /home/s3lab/ygw/postgres_orthros # 실제 노드에서 postgres 데이터를 저장할 경로
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - s3lab-gpu-cluster

---
# PersistentVolumeClaim: postgres data storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ''
  volumeName: postgres-data-pv
  resources:
    requests:
      storage: 50Gi

---
# Deployment: postgres
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ygw-postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: s3lab-gpu-cluster
      containers:
        - name: postgres
          image: postgres:17
          env:
            - name: POSTGRES_USER
              value: 'postgres'
            - name: POSTGRES_PASSWORD
              value: 'postgres'
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ['pg_isready', '-U', 'postgres']
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ['pg_isready', '-U', 'postgres']
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: input-data
              mountPath: /data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
            defaultMode: 0755
        - name: input-data
          hostPath:
            path: /home/s3lab/ygw/Data/Darpa/orthros

---
# Service: ClusterIP — 같은 클러스터 내 Pod에서 "postgres" 호스트명으로 접근 가능
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
